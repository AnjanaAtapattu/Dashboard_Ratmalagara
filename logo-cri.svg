<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Outer green ring -->
  <circle cx="200" cy="200" r="196" fill="#3EB54A" stroke="#2D8E38" stroke-width="4"/>
  <circle cx="200" cy="200" r="145" fill="white" stroke="#555" stroke-width="2"/>

  <!-- Sandy beach -->
  <ellipse cx="200" cy="282" rx="125" ry="32" fill="#D4C5A0"/>
  <ellipse cx="200" cy="288" rx="105" ry="22" fill="#C4B590"/>

  <!-- Palm trunk - curved -->
  <path d="M200 295 Q190 260 185 230 Q178 195 182 165 Q185 145 190 128" stroke="#2A1A0A" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Fronds -->
  <g stroke="#1A3A1A" fill="none" stroke-linecap="round">
    <path d="M190 128 Q160 100 120 82" stroke-width="3.5"/>
    <path d="M190 128 Q165 90 140 68" stroke-width="3.5"/>
    <path d="M190 128 Q182 85 178 55" stroke-width="3.5"/>
    <path d="M190 128 Q200 85 215 62" stroke-width="3.5"/>
    <path d="M190 128 Q215 92 245 75" stroke-width="3.5"/>
    <path d="M190 128 Q225 100 265 90" stroke-width="3.5"/>
    <path d="M190 128 Q230 112 270 108" stroke-width="3.5"/>
    <path d="M190 128 Q155 112 120 115" stroke-width="3"/>
    <path d="M190 128 Q235 118 268 120" stroke-width="3"/>
  </g>

  <!-- Frond leaflets -->
  <g stroke="#1A3A1A" fill="none" stroke-width="1.2">
    <path d="M120 82 Q135 88 148 95"/>
    <path d="M140 68 Q155 78 165 86"/>
    <path d="M245 75 Q232 84 222 90"/>
    <path d="M265 90 Q248 96 238 100"/>
  </g>

  <!-- Coconuts -->
  <circle cx="186" cy="131" r="6" fill="#5D4037"/>
  <circle cx="196" cy="134" r="6" fill="#5D4037"/>
  <circle cx="191" cy="124" r="6" fill="#5D4037"/>
  <circle cx="183" cy="138" r="5.5" fill="#6D5047"/>

  <!-- Text on green ring -->
  <defs>
    <path id="topArc" d="M40,200 a160,160 0 0,1 320,0"/>
    <path id="sinArc" d="M360,200 a160,160 0 0,1 -160,160"/>
    <path id="bottomArc" d="M355,220 a158,158 0 0,1 -310,0"/>
  </defs>

  <text font-family="'Arial Black', 'Impact', sans-serif" font-size="24" font-weight="900" fill="#000" letter-spacing="3.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">COCONUT RESEARCH INSTITUTE</textPath>
  </text>

  <text font-family="sans-serif" font-size="22" font-weight="800" fill="#000" letter-spacing="1.5">
    <textPath href="#sinArc" startOffset="50%" text-anchor="middle">පොල් පර්යේෂණ ආයතනය</textPath>
  </text>

  <text font-family="sans-serif" font-size="19" font-weight="800" fill="#000" letter-spacing="1">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">தென்னை ஆராய்ச்சி நிறுவனம்</textPath>
  </text>
</svg>
