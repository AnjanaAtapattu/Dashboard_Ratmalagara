        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        /* Enhanced Popup Styling */
        .leaflet-popup-content-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .leaflet-popup-tip {
            background: white;
        }

        .popup-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .popup-table tr:nth-child(even) {
            background: #f9f9f9;
        }

        .popup-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
        }

        .popup-table td:first-child {
            font-weight: 600;
            color: #3a7d44;
            width: 45%;
        }

        .popup-table td:last-child {
            color: #333;
        }

        .popup-header {
            background: linear-gradient(135deg, #3a7d44 0%, #2a5c32 100%);
            color: white;
            padding: 12px 10px;
            margin: -10px -10px 8px -10px;
            border-radius: 6px 6px 0 0;
            font-weight: 600;
            font-size: 13px;
        }

        .popup-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 4px;
        }

        .status-healthy {
            background: #e4f5e6;
            color: #2a5c32;
        }

        .status-moderate {
            background: #fdf0d5;
            color: #c47600;
        }

        .status-unhealthy {
            background: #fde0dd;
            color: #c0392b;
        }

        /* GPS Arrow Marker */
        .gps-arrow-marker {
            background: none !important;
            border: none !important;
        }
        .gps-pulse {
            width: 20px; height: 20px; border-radius: 50%;
            background: rgba(37,99,235,0.25);
            animation: gpsPulse 2s ease-out infinite;
            position: absolute; top: 2px; left: 2px;
        }
        @keyframes gpsPulse {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* View toggle button */
        .view-toggle-btn {
            background: white; border: 2px solid rgba(0,0,0,0.2); border-radius: 4px;
            padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .view-toggle-btn:hover { background: #f4f4f4; }

        /* Selection toolbar */
        .selection-toolbar {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1001; background: white; border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25); padding: 8px 12px;
            display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
            max-width: 95vw; font-size: 12px;
        }
        .sel-btn {
            padding: 5px 10px; border-radius: 6px; border: 1px solid #ddd;
            background: white; font-size: 11px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .sel-btn:hover { background: #f0f0f0; }
        .sel-btn.active { background: #3a7d44; color: white; border-color: #3a7d44; }
        .sel-count { font-weight: 700; color: #3a7d44; font-size: 12px; }
        .sel-export { background: #2563eb; color: white; border-color: #2563eb; }
        .sel-export:hover { background: #1d4ed8; }
        .sel-clear { background: #dc2626; color: white; border-color: #dc2626; }
        .sel-clear:hover { background: #b91c1c; }

        /* Comment box in popup */
        .popup-comment-area {
            width: 100%; min-height: 40px; border: 1px solid #ddd; border-radius: 6px;
            padding: 6px 8px; font-size: 11px; font-family: sans-serif; resize: vertical;
            margin-top: 6px;
        }
        .popup-comment-btn {
            margin-top: 4px; padding: 4px 10px; border-radius: 4px; border: none;
            font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .popup-save-btn { background: #3a7d44; color: white; }
        .popup-save-btn:hover { background: #2a5c32; }
        .popup-coord-btn { background: #2563eb; color: white; margin-left: 4px; }
        .popup-coord-btn:hover { background: #1d4ed8; }
        .popup-select-btn { background: #f59e0b; color: white; margin-left: 4px; }
        .popup-select-btn:hover { background: #d97706; }

        /* Dark mode (#13) */
        body.dark-map { background: #1a1a2e; }
        body.dark-map .selection-toolbar { background: #16213e; color: #e0d6c8; border: 1px solid #2a2a4a; }
        body.dark-map .sel-btn { background: #1a1a2e; color: #e0d6c8; border-color: #2a2a4a; }
        body.dark-map .sel-btn:hover { background: #2a2a4a; }
        body.dark-map .ndvi-legend { background: #16213e; color: #e0d6c8; }
        body.dark-map .ndvi-legend h3 { color: #e0d6c8; }
        body.dark-map .legend-label { color: #e0d6c8; }
        body.dark-map .legend-count { color: #b8a88a; }
        body.dark-map .legend-item:hover { background-color: #1a2a4a; }
        body.dark-map .view-toggle-btn { background: #16213e; color: #e0d6c8; border-color: #2a2a4a; }

        /* Photo preview in popup (#11) */
        .popup-photo-preview { max-width: 100%; max-height: 120px; border-radius: 6px; margin-top: 6px; border: 1px solid #ddd; }

        /* Interactive Legend */
        .ndvi-legend {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 15px;
            max-width: 300px;
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            max-height: 60vh;
            overflow-y: auto;
            font-size: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .ndvi-legend h3 {
            margin: 0 0 12px 0;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 3px solid #3a7d44;
            padding-bottom: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .legend-item:hover {
            background-color: #f0f4ff;
            transform: translateX(5px);
        }

        .legend-item.active {
            background-color: #e8f0ff;
            border-left: 4px solid #3a7d44;
            padding-left: 12px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            margin-right: 10px;
            border: 2px solid #ddd;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .legend-item:hover .legend-color {
            transform: scale(1.15);
        }

        .legend-info {
            flex: 1;
        }

        .legend-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 2px;
        }

        .legend-count {
            font-size: 10px;
            color: #999;
        }

        .legend-description {
            font-size: 10px;
            color: #666;
            margin-top: 2px;
            line-height: 1.3;
        }

        /* Legend toggle checkbox */
        .legend-toggle {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }

        .legend-toggle input {
            margin-right: 8px;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        /* Scrollbar */
        .ndvi-legend::-webkit-scrollbar {
            width: 6px;
        }

        .ndvi-legend::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .ndvi-legend::-webkit-scrollbar-thumb {
            background: #3a7d44;
            border-radius: 3px;
        }

        .ndvi-legend::-webkit-scrollbar-thumb:hover {
            background: #2a5c32;
        }
        </style>
        <title>Ratmalagara Research Center — NDVI Map</title>

        <div id="map">

        <div style="position:fixed;top:10px;right:10px;z-index:1001;display:flex;gap:6px;">
          <button class="view-toggle-btn" id="viewToggle" onclick="toggleView()" title="Switch desktop/mobile view" style="position:static;">🖥️ Desktop</button>

        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;
            highlightLayer.openPopup();
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[7.543207261086193,79.88601747918575],[7.553582324054899,79.89933044151552]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Update popup position when the video loads its metadata
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        L.control.locate({
            position: 'topleft',
            locateOptions: {maxZoom: 19, enableHighAccuracy: true, watch: true},
            follow: true,
            setView: 'untilPan',
            keepCurrentZoomLevel: true,
            flyTo: true,
            drawMarker: true,
            drawCircle: true,
            markerClass: L.marker,
            compassClass: L.marker,
            createButtonCallback: function(container, options) {
                var link = L.DomUtil.create('a', 'leaflet-bar-part leaflet-bar-part-single', container);
                link.title = 'Show my location';
                link.href = '#';
                link.setAttribute('role', 'button');
                link.innerHTML = '<i class="fas fa-location-arrow"></i>';
                return { link: link, icon: link };
            },
            icon: 'fas fa-location-arrow',
            iconLoading: 'fas fa-spinner fa-spin',
            onLocationFound: function(e) {
                if (window._gpsArrowMarker) {
                    map.removeLayer(window._gpsArrowMarker);
                }
                var heading = e.heading || 0;
                var arrowIcon = L.divIcon({
                    className: 'gps-arrow-marker',
                    html: '<div style="transform:rotate(' + heading + 'deg);font-size:22px;color:#2563eb;text-shadow:0 0 6px rgba(37,99,235,0.5);">&#x25B2;</div>',
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });
                window._gpsArrowMarker = L.marker(e.latlng, {icon: arrowIcon, zIndexOffset: 9999}).addTo(map);
            }
        }).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 22
        });
        layer_GoogleSatellite_0;
        map.addLayer(layer_GoogleSatellite_0);
        map.createPane('pane_RatmalagaraEstate_1');
        map.getPane('pane_RatmalagaraEstate_1').style.zIndex = 401;
        var img_RatmalagaraEstate_1 = 'data/RatmalagaraEstate_1.png';
        var img_bounds_RatmalagaraEstate_1 = [[7.5416315395741975,79.88582921399193],[7.556252747681153,79.900403588061]];
        var layer_RatmalagaraEstate_1 = new L.imageOverlay(img_RatmalagaraEstate_1,
                                              img_bounds_RatmalagaraEstate_1,
                                              {pane: 'pane_RatmalagaraEstate_1'});
        bounds_group.addLayer(layer_RatmalagaraEstate_1);
        map.addLayer(layer_RatmalagaraEstate_1);
        function pop_Boundary_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Id'] !== null ? autolinker.link(String(feature.properties['Id']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Boundary_2_0() {
            return {
                pane: 'pane_Boundary_2',
                opacity: 1,
                color: 'rgba(255,0,0,1.0)',
                dashArray: '',
                lineCap: 'square',
                lineJoin: 'bevel',
                weight: 2.0,
                fillOpacity: 0,
                interactive: true,
            }
        }
        map.createPane('pane_Boundary_2');
        map.getPane('pane_Boundary_2').style.zIndex = 402;
        map.getPane('pane_Boundary_2').style['mix-blend-mode'] = 'normal';
        var layer_Boundary_2 = new L.geoJson(json_Boundary_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Boundary_2',
            layerName: 'layer_Boundary_2',
            pane: 'pane_Boundary_2',
            onEachFeature: pop_Boundary_2,
            style: style_Boundary_2_0,
        });
        bounds_group.addLayer(layer_Boundary_2);
        map.addLayer(layer_Boundary_2);
        function pop_Critical_3(feature, layer) {
            layer.on({ mouseout: function(e) { if (typeof layer.closePopup == 'function') layer.closePopup(); else layer.eachLayer(function(f){ f.closePopup(); }); }, mouseover: highlightFeature, click: highlightFeature });
            var content = buildEnhancedPopup(feature, 'Critical', '🔴', 'status-unhealthy', '#c0392b');
            layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 500, maxWidth: 320 });
        }

        function style_Critical_3_0() {
            return {
                pane: 'pane_Critical_3',
                opacity: 1,
                color: 'rgba(123,23,23,0.6)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 0.5,
                fill: true,
                fillOpacity: 0.95,
                fillColor: '#a42133',
                interactive: true,
            }
        }
        map.createPane('pane_Critical_3');
        map.getPane('pane_Critical_3').style.zIndex = 403;
        map.getPane('pane_Critical_3').style['mix-blend-mode'] = 'normal';
        var layer_Critical_3 = new L.geoJson(json_Critical_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Critical_3',
            layerName: 'layer_Critical_3',
            pane: 'pane_Critical_3',
            onEachFeature: pop_Critical_3,
            style: style_Critical_3_0,
        });
        bounds_group.addLayer(layer_Critical_3);
        map.addLayer(layer_Critical_3);
        function pop_Severs_Stress_4(feature, layer) {
            layer.on({ mouseout: function(e) { if (typeof layer.closePopup == 'function') layer.closePopup(); else layer.eachLayer(function(f){ f.closePopup(); }); }, mouseover: highlightFeature, click: highlightFeature });
            var content = buildEnhancedPopup(feature, 'Severe Stress', '🔶', 'status-unhealthy', '#c0392b');
            layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 500, maxWidth: 320 });
        }

        function style_Severs_Stress_4_0() {
            return {
                pane: 'pane_Severs_Stress_4',
                opacity: 1,
                color: 'rgba(192,57,43,0.6)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 0.5,
                fill: true,
                fillOpacity: 0.95,
                fillColor: '#f55f49',
                interactive: true,
            }
        }
        map.createPane('pane_Severs_Stress_4');
        map.getPane('pane_Severs_Stress_4').style.zIndex = 404;
        map.getPane('pane_Severs_Stress_4').style['mix-blend-mode'] = 'normal';
        var layer_Severs_Stress_4 = new L.geoJson(json_Severs_Stress_4, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Severs_Stress_4',
            layerName: 'layer_Severs_Stress_4',
            pane: 'pane_Severs_Stress_4',
            onEachFeature: pop_Severs_Stress_4,
            style: style_Severs_Stress_4_0,
        });
        bounds_group.addLayer(layer_Severs_Stress_4);

        var selectedTrees = {};

        var treePhotos = JSON.parse(localStorage.getItem('treePhotos') || '{}');

        function getTreeCoords(feature) {
            var geom = feature.geometry;
            if (geom.type === 'Point') return {lat: geom.coordinates[1], lon: geom.coordinates[0]};
            if (geom.type === 'Polygon' || geom.type === 'MultiPolygon') {
                var coords = geom.type === 'Polygon' ? geom.coordinates[0] : geom.coordinates[0][0];
                var lat = 0, lon = 0;
                for (var i = 0; i < coords.length; i++) { lon += coords[i][0]; lat += coords[i][1]; }
                return {lat: (lat / coords.length).toFixed(6), lon: (lon / coords.length).toFixed(6)};
            }
            return {lat: 'N/A', lon: 'N/A'};
        }

        function toggleTreeSelection(treeId, lat, lon, ndvi, status, comment) {
            if (selectedTrees[treeId]) {
                delete selectedTrees[treeId];
            } else {
                selectedTrees[treeId] = {id: treeId, lat: lat, lon: lon, ndvi: ndvi, status: status, comment: comment || ''};
            }
            updateSelectionCount();
            var btn = document.getElementById('selBtn_' + treeId);
            if (btn) btn.textContent = selectedTrees[treeId] ? '✓ Selected' : '☐ Select';
            if (btn) btn.style.background = selectedTrees[treeId] ? '#3a7d44' : '#f59e0b';
        }

        function selectAllVisible() {
            var layers = [layer_Critical_3, layer_Severs_Stress_4, layer_Mid_Stress_5, layer_Unhealthy_6, layer_Moderate_7, layer_Healthy_8];
            var statusMap = {0:'Critical',1:'Severe Stress',2:'Mid Stress',3:'Unhealthy',4:'Moderate',5:'Healthy'};
            layers.forEach(function(lyr, idx) {
                if (!map.hasLayer(lyr)) return;
                lyr.eachLayer(function(l) {
                    var f = l.feature;
                    if (!f) return;
                    var id = f.properties['OBJECTID_1'] || Math.random();
                    var c = getTreeCoords(f);
                    var ndvi = f.properties['MEAN'] ? parseFloat(f.properties['MEAN']).toFixed(4) : 'N/A';
                    selectedTrees[id] = {id:id, lat:c.lat, lon:c.lon, ndvi:ndvi, status:statusMap[idx], comment: treeComments[id] || ''};
                });
            });
            updateSelectionCount();
        }

        function filterByHealth() {
            var val = document.getElementById('selHealthFilter').value;
            var layerMap = {
                'all': [layer_Critical_3, layer_Severs_Stress_4, layer_Mid_Stress_5, layer_Unhealthy_6, layer_Moderate_7, layer_Healthy_8],
                'healthy': [layer_Healthy_8],
                'moderate': [layer_Moderate_7],
                'unhealthy': [layer_Unhealthy_6],
                'mid_stress': [layer_Mid_Stress_5],
                'severe': [layer_Severs_Stress_4],
                'critical': [layer_Critical_3]
            };
            var allLayers = [layer_Critical_3, layer_Severs_Stress_4, layer_Mid_Stress_5, layer_Unhealthy_6, layer_Moderate_7, layer_Healthy_8];
            var show = layerMap[val] || allLayers;
            allLayers.forEach(function(lyr) {
                if (show.indexOf(lyr) >= 0) {
                    if (!map.hasLayer(lyr)) map.addLayer(lyr);
                    // Reset any block-dimming applied previously
                    lyr.eachLayer(function(l) { if (l.setStyle) l.setStyle({opacity: 1, fillOpacity: 1}); });
                }
                else { if (map.hasLayer(lyr)) map.removeLayer(lyr); }
            });
        }

            for (var i = 0; i < BLOCK_BOUNDS.length; i++) {
                var b = BLOCK_BOUNDS[i];
                if (lat >= b.latMin && lat <= b.latMax && lon >= b.lonMin && lon <= b.lonMax) return b.name;
            }
            return null;
        }

        function filterByBlock() {
            var blockVal = document.getElementById('selBlockFilter').value;
            if (blockVal === 'all') {
                filterByHealth();
                return;
            }
            var healthVal = document.getElementById('selHealthFilter').value;
            var healthLayers = {
                'all': [layer_Critical_3, layer_Severs_Stress_4, layer_Mid_Stress_5, layer_Unhealthy_6, layer_Moderate_7, layer_Healthy_8],
                'healthy': [layer_Healthy_8], 'moderate': [layer_Moderate_7], 'unhealthy': [layer_Unhealthy_6],
                'mid_stress': [layer_Mid_Stress_5], 'severe': [layer_Severs_Stress_4], 'critical': [layer_Critical_3]
            };
            var allLayers = [layer_Critical_3, layer_Severs_Stress_4, layer_Mid_Stress_5, layer_Unhealthy_6, layer_Moderate_7, layer_Healthy_8];
            var show = healthLayers[healthVal] || allLayers;
            var block = BLOCK_BOUNDS.find(function(b) { return b.name === blockVal; });
            allLayers.forEach(function(lyr) {
                if (show.indexOf(lyr) >= 0) {
                    if (!map.hasLayer(lyr)) map.addLayer(lyr);
                    lyr.eachLayer(function(l) {
                        if (!l.feature) return;
                        var c = getTreeCoords(l.feature);
                        var lat = parseFloat(c.lat), lon = parseFloat(c.lon);
                        var inBlock = lat >= block.latMin && lat <= block.latMax && lon >= block.lonMin && lon <= block.lonMax;
                        l.setStyle({opacity: inBlock ? 1 : 0.08, fillOpacity: inBlock ? 1 : 0.05});
                    });
                } else {
                    if (map.hasLayer(lyr)) map.removeLayer(lyr);
                }
            });
            if (block) {
                map.fitBounds([[block.latMin, block.lonMin], [block.latMax, block.lonMax]], {padding: [20, 20]});
            }
        }

        // ═══════════════════════════════════════
        // #1 — TREE SEARCH VIA POSTMESSAGE
        // ═══════════════════════════════════════
        var allTreeLayers = [
            {layer: layer_Healthy_8, status: 'Healthy'},
            {layer: layer_Moderate_7, status: 'Moderate'},
            {layer: layer_Mid_Stress_5, status: 'Mid Stress'},
            {layer: layer_Severs_Stress_4, status: 'Severe Stress'},
            {layer: layer_Critical_3, status: 'Critical'}
        ];

        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'searchTree') {
                var searchId = String(e.data.id);
                var found = false;
                for (var i = 0; i < allTreeLayers.length; i++) {
                    var info = allTreeLayers[i];
                    var result = null;
                    info.layer.eachLayer(function(l) {
                        if (result) return;
                        if (l.feature && String(l.feature.properties['OBJECTID_1']) === searchId) {
                            result = l;
                        }
                    });
                    if (result) {
                        var f = result.feature;
                        var coords = getTreeCoords(f);
                        var ndvi = f.properties['MEAN'] ? parseFloat(f.properties['MEAN']).toFixed(4) : 'N/A';
                        var block = getTreeBlock(coords) || 'Unknown';
                        window.parent.postMessage({
                            type: 'treeSearchResult', found: true, id: searchId,
                            ndvi: ndvi, status: info.status, lat: coords.lat, lon: coords.lon, block: block
                        }, '*');
                        map.setView([parseFloat(coords.lat), parseFloat(coords.lon)], 20);
                        result.openPopup();
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    window.parent.postMessage({type: 'treeSearchResult', found: false, id: searchId}, '*');
                }
            }
        });

        // ═══════════════════════════════════════
        // #11 — PHOTO ATTACHMENT FOR TREE COMMENTS
        // ═══════════════════════════════════════

        function attachTreePhoto(treeId) {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.capture = 'environment';
            input.onchange = function() {
                var file = input.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function(e) {
                    var canvas = document.createElement('canvas');
                    var img = new Image();
                    img.onload = function() {
                        var maxW = 400, scale = Math.min(1, maxW / img.width);
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        var dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        treePhotos[treeId] = dataUrl;
                        try { localStorage.setItem('treePhotos', JSON.stringify(treePhotos)); } catch(ex) {}
                        var preview = document.getElementById('photoPreview_' + treeId);
                        if (preview) preview.innerHTML = '<img src="' + dataUrl + '" class="popup-photo-preview" alt="Field photo">';
                        var status = document.getElementById('commentStatus_' + treeId);
                        if (status) { status.textContent = '📷 Photo saved'; status.style.color = '#2563eb'; }
                    };
                    img.src = e.target.result;
                };
                reader.onerror = function() {
                    var status = document.getElementById('commentStatus_' + treeId);
                    if (status) { status.textContent = '⚠️ Photo failed to load'; status.style.color = '#dc2626'; }
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }
        </script>        
    </body>
