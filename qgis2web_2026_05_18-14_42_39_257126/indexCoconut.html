        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        /* Enhanced Popup Styling */
        .leaflet-popup-content-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .leaflet-popup-tip {
            background: white;
        }

        .popup-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .popup-table tr:nth-child(even) {
            background: #f9f9f9;
        }

        .popup-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
        }

        .popup-table td:first-child {
            font-weight: 600;
            color: #3a7d44;
            width: 45%;
        }

        .popup-table td:last-child {
            color: #333;
        }

        .popup-header {
            background: linear-gradient(135deg, #3a7d44 0%, #2a5c32 100%);
            color: white;
            padding: 12px 10px;
            margin: -10px -10px 8px -10px;
            border-radius: 6px 6px 0 0;
            font-weight: 600;
            font-size: 13px;
        }

        .popup-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 4px;
        }

        .status-healthy {
            background: #e4f5e6;
            color: #2a5c32;
        }

        .status-moderate {
            background: #fdf0d5;
            color: #c47600;
        }

        .status-unhealthy {
            background: #fde0dd;
            color: #c0392b;
        }

        /* Interactive Legend */
        .ndvi-legend {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 15px;
            max-width: 300px;
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            max-height: 60vh;
            overflow-y: auto;
            font-size: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .ndvi-legend h3 {
            margin: 0 0 12px 0;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 3px solid #3a7d44;
            padding-bottom: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .legend-item:hover {
            background-color: #f0f4ff;
            transform: translateX(5px);
        }

        .legend-item.active {
            background-color: #e8f0ff;
            border-left: 4px solid #3a7d44;
            padding-left: 12px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            margin-right: 10px;
            border: 2px solid #ddd;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .legend-item:hover .legend-color {
            transform: scale(1.15);
        }

        .legend-info {
            flex: 1;
        }

        .legend-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 2px;
        }

        .legend-count {
            font-size: 10px;
            color: #999;
        }

        .legend-description {
            font-size: 10px;
            color: #666;
            margin-top: 2px;
            line-height: 1.3;
        }

        /* Legend toggle checkbox */
        .legend-toggle {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }

        .legend-toggle input {
            margin-right: 8px;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        /* Scrollbar */
        .ndvi-legend::-webkit-scrollbar {
            width: 6px;
        }

        .ndvi-legend::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .ndvi-legend::-webkit-scrollbar-thumb {
            background: #3a7d44;
            border-radius: 3px;
        }

        .ndvi-legend::-webkit-scrollbar-thumb:hover {
            background: #2a5c32;
        }
        </style>

        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

		document.addEventListener("DOMContentLoaded", function() {
            // set new Layers List height which considers toggle icon
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height 
                        || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            // toggle Collapsed/Expanded and apply new Layers List height
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight()
            });	
			// apply new Layers List height if toggle layerstree
			if (controlLayersElement) {
				controlLayersElement.addEventListener('click', function(event) {
					var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
					if (toggleLayerHeaderPointer) {
						newLayersListHeight();
					}
				});
			}
            // Collapsed/Expanded at Start to apply new height
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            // Collapsed touch/small screen
            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }  
        });
